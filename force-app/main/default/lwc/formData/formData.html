<template>
    <lightning-card title="Account Form" icon-name="standard:account">
        <div class="slds-p-around_medium">

            <!-- Success Message -->
            <template if:true={isSuccess}>
                <div class="slds-notify slds-notify_toast slds-theme_success slds-m-bottom_medium" role="status">
                    <lightning-icon icon-name="utility:success" alternative-text="success" size="small" class="slds-m-right_small"></lightning-icon>
                    <div class="slds-notify__content">
                        <h2 class="slds-text-heading_small">Form submitted successfully!</h2>
                    </div>
                </div>
            </template>

            <div class="slds-grid slds-wrap slds-gutters">

                <!-- Full Name -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                    <lightning-input
                        type="text"
                        name="fullName"
                        label="Full Name"
                        placeholder="Enter full name"
                        value={formFields.fullName}
                        onchange={handleChange}
                        required>
                    </lightning-input>
                </div>

                <!-- Email -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                    <lightning-input
                        type="email"
                        name="email"
                        label="Email Address"
                        placeholder="Enter email address"
                        value={formFields.email}
                        onchange={handleChange}
                        required>
                    </lightning-input>
                </div>

                <!-- Phone -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                    <lightning-input
                        type="tel"
                        name="phone"
                        label="Phone Number"
                        placeholder="Enter phone number"
                        value={formFields.phone}
                        onchange={handleChange}
                        required>
                    </lightning-input>
                </div>

                <!-- Company -->
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-m-bottom_medium">
                    <lightning-input
                        type="text"
                        name="company"
                        label="Company Name"
                        placeholder="Enter company name"
                        value={formFields.company}
                        onchange={handleChange}
                        required>
                    </lightning-input>
                </div>

            </div>

            <!-- Buttons -->
            <div class="slds-m-top_medium slds-text-align_center">
                <lightning-button variant="brand" label="Submit" title="Submit Form" onclick={handleSubmit} class="slds-m-left_x-small"></lightning-button>
                <lightning-button variant="neutral" label="Reset" title="Reset Form" onclick={handleReset} class="slds-m-left_x-small"></lightning-button>
            </div>

        </div>
    </lightning-card>
</template>
