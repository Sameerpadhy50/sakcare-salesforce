name: Deploy to SakcareQA

# ─── Triggers ──────────────────────────────────────────────────────────────────
# Runs automatically on every push to master (merged PR)
# and on every PR opened/updated against master (for validation only — no deploy)
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# ─── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Jest unit tests (runs on every push AND every PR) ─────────────────
  jest-tests:
    name: 🧪 LWC Jest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Jest unit tests
        run: npm run test:unit -- --ci --reporters=default --reporters=jest-junit
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results
          JEST_JUNIT_OUTPUT_NAME: jest-results.xml

      - name: Upload Jest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-test-results
          path: test-results/jest-results.xml

  # ── Job 2: Deploy to SakcareQA (runs ONLY when code is merged to master) ─────
  deploy-to-qa:
    name: 🚀 Deploy to SakcareQA
    runs-on: ubuntu-latest
    needs: jest-tests                     # waits for Jest to pass first
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli --prefer-global

      - name: Authenticate to SakcareQA scratch org
        # SFDX_AUTH_URL is stored as a GitHub Secret — never hardcoded
        run: |
          echo "${{ secrets.SFDX_AUTH_URL_SAKCAREQA }}" > /tmp/sfdx-auth-url.txt
          sf org login sfdx-url \
            --sfdx-url-file /tmp/sfdx-auth-url.txt \
            --alias SakcareQA \
            --set-default
          rm /tmp/sfdx-auth-url.txt

      - name: Verify org connection
        run: sf org display --target-org SakcareQA

      - name: Deploy Apex classes
        run: |
          sf project deploy start \
            --metadata "ApexClass:AccountListController" \
            --metadata "ApexClass:AccountListControllerTest" \
            --target-org SakcareQA \
            --ignore-conflicts \
            --wait 10

      - name: Deploy accountListViewer LWC
        run: |
          sf project deploy start \
            --metadata "LightningComponentBundle:accountListViewer" \
            --target-org SakcareQA \
            --ignore-conflicts \
            --wait 10

      - name: Deploy Sakcare FlexiPage
        run: |
          sf project deploy start \
            --metadata "FlexiPage:Sakcare" \
            --target-org SakcareQA \
            --ignore-conflicts \
            --wait 10

      - name: Run Apex tests & verify coverage
        run: |
          sf apex run test \
            --class-names AccountListControllerTest \
            --target-org SakcareQA \
            --result-format human \
            --code-coverage \
            --wait 10

      - name: Comment deploy result on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji  = status === 'success' ? '✅' : '❌';
            const msg    = status === 'success'
              ? '**Deploy to SakcareQA succeeded!** Apex + LWC + FlexiPage deployed and Apex tests passed.'
              : '**Deploy to SakcareQA failed.** Check the Actions log for details.';
            if (context.payload.pull_request) {
              github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${emoji} ${msg}`
              });
            }
